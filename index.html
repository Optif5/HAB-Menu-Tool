<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#fff3c4,#ffe4a3,#ffd98a);
}

/* CATEGORY BAR (FIXED) */
.categories {
  display: flex;
  overflow-x: auto;
  background: linear-gradient(90deg,#000,#a00);
  padding: 10px 0;
  border-radius: 0; /* ❌ removed round */
}

.cat-btn {
  margin: 0 6px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #ddd;
}

.cat-btn.active {
  background: linear-gradient(135deg,#fff3c4,#ffd98a);
}

/* SEARCH */
.search-sort {
  display: flex;
  gap: 6px;
  padding: 10px;
}

.search {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

/* SORT DROPDOWN (DIRECT OPEN) */
.sort-container {
  position: relative;
}

.sort-btn {
  background: #000;
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  border: none;
}

.sort-dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 45px;
  background: #444;
  color: #fff;
  border-radius: 10px;
  overflow: hidden;
}

.sort-dropdown div {
  padding: 10px;
}

.sort-dropdown div:hover {
  background: #666;
}

/* CHECKOUT */
.checkout {
  padding: 15px;
}

/* HEADER FIX */
.checkout-header {
  position: relative;
  margin-bottom: 10px;
}

.back-btn {
  background: none;
  border: none;
}

.checkout-title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-weight: bold;
}

/* SIDE BY SIDE DROPDOWNS */
.row {
  display: flex;
  gap: 10px;
}

.row select {
  flex: 1;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* OR DIVIDER */
.or {
  text-align: center;
  margin: 10px 0;
  font-weight: bold;
}

/* BUTTON */
.btn {
  background: red;
  color: white;
  padding: 12px;
  border-radius: 20px;
  border: none;
  width: 100%;
}

</style>
</head>

<body>

<!-- CATEGORY -->
<div class="categories">
  <button class="cat-btn active">All</button>
  <button class="cat-btn">Grill</button>
  <button class="cat-btn">Breakfast</button>
</div>

<!-- SEARCH + SORT -->
<div class="search-sort">
  <input class="search" placeholder="Search...">

  <div class="sort-container">
    <button class="sort-btn" onclick="toggleSort()">⇅</button>

    <div id="sortDropdown" class="sort-dropdown">
      <div>Sort by menu number</div>
      <div>Sort by name</div>
      <div>Sort by price</div>
    </div>
  </div>
</div>

<!-- CHECKOUT -->
<div class="checkout">

  <div class="checkout-header">
    <button class="back-btn">← Back to cart</button>
    <div class="checkout-title">Checkout details</div>
  </div>

  <input id="name" placeholder="Name" required>
  <input id="phone" placeholder="Phone Number" required>

  <!-- SIDE BY SIDE -->
  <div class="row">
    <select id="emirate">
      <option>Emirate</option>
      <option>Dubai</option>
    </select>

    <select id="area">
      <option>Area</option>
      <option>Bur Dubai</option>
    </select>
  </div>

  <!-- ADDRESS -->
  <input id="address" placeholder="Enter Flat Number, Landmark, Street">

  <div class="or">OR</div>

  <button onclick="pickMap()">Pick on map</button>

  <textarea placeholder="Notes"></textarea>

  <button class="btn" onclick="submitOrder()">Place Order</button>

</div>

<script>

/* SORT FIX */
function toggleSort() {
  const el = document.getElementById("sortDropdown");
  el.style.display = el.style.display === "block" ? "none" : "block";
}

/* VALIDATION */
function submitOrder() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const emirate = document.getElementById("emirate").value;
  const area = document.getElementById("area").value;

  if (!name || !phone) {
    alert("Name and phone are required");
    return;
  }

  if (!address && (emirate === "Emirate" || area === "Area")) {
    alert("Please provide location (manual or map)");
    return;
  }

  alert("Order placed!");
}

/* MAP */
function pickMap() {
  window.open("https://www.google.com/maps");
}

</script>

</body>
</html>
