<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAB Ordering</title>

<style>

/* 🌟 NEW GLOBAL BACKGROUND (same as category highlight vibe) */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff3c4, #ffe4a3, #ffd98a);
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #f5e6c8;
}

.logo {
  font-weight: bold;
}

.cart-btn {
  background: black;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.cat-btn {
  padding: 10px 16px;
  border-radius: 20px;
  border: none;
  background: #ddd;
}

/* 🔥 Active style reused */
.cat-btn.active {
  background: linear-gradient(135deg, #fff3c4, #ffd98a);
  color: #000;
  font-weight: bold;
}

/* Search + Sort */
.search-sort-container {
  display: flex;
  gap: 8px;
  padding: 10px;
}

.search-input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

.sort-btn {
  background: black;
  color: white;
  padding: 10px;
  border-radius: 12px;
}

/* Cards */
.card {
  margin: 12px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
}

/* Price */
.price {
  background: black;
  color: white;
  padding: 6px 10px;
  border-radius: 20px;
  display: inline-block;
}

/* Options */
.option {
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #e0b84c;
  background: #fff8dc;
}

/* Button */
.add-btn {
  background: red;
  color: white;
  padding: 12px;
  border-radius: 20px;
  border: none;
  width: 100%;
}

/* Cart */
.cart-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: linear-gradient(90deg, black, red);
  color: white;
  padding: 15px;
}

/* Checkout Header */
.checkout-header {
  position: relative;
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.back-btn {
  background: none;
  border: none;
  font-weight: bold;
}

.checkout-title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-weight: bold;
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">HAB</div>
  <div class="cart-btn">Cart 0</div>
</div>

<div class="categories">
  <button class="cat-btn active">All</button>
  <button class="cat-btn">Grill</button>
  <button class="cat-btn">Breakfast</button>
</div>

<div class="search-sort-container">
  <input class="search-input" placeholder="Search...">
  <button class="sort-btn">⇅</button>
</div>

<div class="card">
  <h3>Chicken Charcoal</h3>
  <div class="price">DHS 22 / 40</div>

  <div style="display:flex; gap:10px; margin-top:10px;">
    <div class="option">Half</div>
    <div class="option">Full</div>
  </div>

  <button class="add-btn">Add to cart</button>
</div>

<div class="cart-bar">
  Your Order - DHS 0.00
</div>

</body>
</html>
